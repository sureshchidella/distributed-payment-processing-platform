spring:
  application:
    name: common-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_simulator
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
spring:
  application:
    name: gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_simulator
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  redis:
    host: localhost
    port: 6379
    timeout: 2000
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10s

server:
  port: 8080

logging:
  level:
    com.suresh.paymentsimulator: DEBUG
    org.springframework.cache: DEBUG